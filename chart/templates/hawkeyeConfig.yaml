apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hawkeye.hawkeyeConfigName" . }}
  labels:
    {{- include "hawkeye.labels" . | nindent 4 }}
data:
  .hawkeye.yaml: |
	{{- .Values.hawkeyeConfig | toYaml | nindent 4 }}
  {{- if .Values.checksConfig }}
  checks.yaml: |
	{{- .Values.checksConfig | toYaml | nindent 4 }}
  {{- end }}
